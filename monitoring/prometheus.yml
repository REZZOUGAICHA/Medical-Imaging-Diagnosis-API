global:
  scrape_interval: 15s      # ask the API for metrics every 15 seconds
  evaluation_interval: 15s  # evaluate alerting rules every 15 seconds

scrape_configs:
  - job_name: "medical-imaging-api"
    static_configs:
      - targets: ["api:8000"]  # "api" = the service name in docker-compose
    metrics_path: "/metrics"   # the endpoint we'll expose on the FastAPI app
