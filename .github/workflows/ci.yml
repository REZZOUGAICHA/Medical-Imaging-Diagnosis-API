name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Cache pip downloads — keyed on both requirement files
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements-api.txt', 'requirements-dev.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      # Cache torchvision's downloaded ImageNet weights (~75 MB)
      # Without this, every CI run re-downloads EfficientNet-B4 weights
      - name: Cache torch hub weights
        uses: actions/cache@v4
        with:
          path: ~/.cache/torch
          key: ${{ runner.os }}-torch-efficientnet-b4-v1

      - name: Install CPU PyTorch
        run: pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu

      - name: Install API dependencies
        run: pip install -r requirements-api.txt

      - name: Install test dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest tests/ -v
